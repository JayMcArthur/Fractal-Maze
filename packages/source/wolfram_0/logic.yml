    Executable WIP hand-authored from the visible eight-terminal Wolfram simple
    fractal maze. The graph covers the visible wire components and replays a
    derived solution, but terminal numbering should still be independently
    checked against the original source image.
  next_step: >-
    Confirm the top-left/top-right boundary labels as terminals 8 and 1,
    then verify every visible component against the original Wolfram
    Demonstrations source.
provenance:
  notes:
    - S is modeled as root terminal 8 and F as root terminal 1.
    - M is the single recursive child maze visible in the center of each copy.
    - >-
      Multi-terminal visible junctions are represented by pairwise transitions
      within the connected component.
    - >-
      The short solution follows the red solution trace in the Wikimedia SVG
      reference and the local Wolfram_0 image topology.
